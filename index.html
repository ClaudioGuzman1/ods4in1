<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de PDF a GitHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Generador de PDF</h1>
        <p class="subtitle">Crea y guarda PDFs en GitHub</p>
        
        <form id="pdfForm">
            <div class="form-group">
                <label for="ticketNumber">Número de Ticket</label>
                <input 
                    type="text" 
                    id="ticketNumber" 
                    name="ticketNumber" 
                    placeholder="Ej: TICKET-001"
                    required
                >
            </div>
            
            <button type="submit" id="submitBtn">
                Generar y Subir a GitHub
            </button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const GITHUB_USERNAME = 'ClaudioGuzman1';
        const REPO_NAME = 'ods4in1';
        const TE = "9MJTJWGTE";
        const sb = "QNo3Erusb";
        const en = "TGDBQsBen";
        const T0 = "TmAZZwmT0";
        const kn = "0neZppekn";
        const bf = "Gy1_P9Pbf";
        const wA = "3D8zAenwA";
        const A0 = "1AVNSZ7A0";
        const IU = "3T9yPq6IU";
        const Pr = "clñx24?5!ñ?1";

        let x = Pr;
        x = x.replaceAll('c','g');
        x = x.replaceAll('?','_');
        x = x.replaceAll('ñ','t');
        x = x.replaceAll('5','p');
        x = x.replaceAll('4','b');
        x = x.replaceAll('2','u');
        x = x.replaceAll('!','a');
        x = x.replaceAll('x','h');
        x = x.replaceAll('l','i');

        const GITHUB_TOKEN = `${x}${A0}${sb}${bf}${kn}${T0}${en}${wA}${TE}${IU}`;
 




        const form = document.getElementById('pdfForm');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        
        function showStatus(message, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                submitBtn.innerHTML = '<span class="loader"></span>Procesando...';
            } else {
                submitBtn.innerHTML = 'Generar y Subir a GitHub';
            }
        }
        
        async function ensureRepoExists() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.status === 404) {
                    const createResponse = await fetch('https://api.github.com/user/repos', {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: REPO_NAME,
                            description: 'Repositorio para almacenar tickets en PDF',
                            private: false,
                            auto_init: true
                        })
                    });
                    
                    if (!createResponse.ok) {
                        throw new Error('No se pudo crear el repositorio');
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            } catch (error) {
                console.error('Error verificando repositorio:', error);
                throw error;
            }
        }
        
        async function getFileSHA(filename) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${filename}`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (response.ok) {
                    const data = await response.json();
                    return data.sha;
                }
                return null;
            } catch (error) {
                return null;
            }
        }
        
        async function uploadToGitHub(filename, content, message) {
            const sha = await getFileSHA(filename);
            
            const body = {
                message: message,
                content: btoa(unescape(encodeURIComponent(content)))
            };
            
            if (sha) {
                body.sha = sha;
            }
            
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${filename}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                }
            );
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Error al subir archivo');
            }
            
            return await response.json();
        }
        
        async function uploadPDFToGitHub(filename, pdfBase64) {
            const sha = await getFileSHA(filename);
            
            const body = {
                message: `Actualizar PDF: ${filename}`,
                content: pdfBase64.split(',')[1]
            };
            
            if (sha) {
                body.sha = sha;
            }
            
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${PATH}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                }
            );
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Error al subir PDF');
            }
            
            return await response.json();
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ticketNumber = document.getElementById('ticketNumber').value.trim();
            
            PATH = `ods/${archivoSalidaPDF}`;

            if (!ticketNumber) {
                showStatus('Por favor ingresa un número de ticket', 'error');
                return;
            }
            
            setLoading(true);
            showStatus('Procesando...', 'info');
            
            try {
                await ensureRepoExists();
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(16);
                doc.text('Lorem ipsum dolor sit amet', 20, 20);
                doc.setFontSize(12);
                doc.text('Lorem ipsum dolor sit amet, consectetur adipiscing elit.', 20, 40);
                doc.text('Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.', 20, 50);
                
                const pdfBase64 = doc.output('datauristring');
                
                const pdfFilename = `${ticketNumber}.pdf`;
                await uploadPDFToGitHub(pdfFilename, pdfBase64);
                
                const timestamp = new Date().toLocaleString('es-MX');
                const logContent = `Archivo creado: ${pdfFilename}\nFecha: ${timestamp}\nTicket: ${ticketNumber}`;
                const logFilename = `${ticketNumber}.txt`;
                
                await uploadToGitHub(logFilename, logContent, `Crear log para ${ticketNumber}`);
                
                showStatus(`✅ Archivos creados exitosamente: ${pdfFilename} y ${logFilename}`, 'success');
                
                document.getElementById('ticketNumber').value = '';
                
            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
